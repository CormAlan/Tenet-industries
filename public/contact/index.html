<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Teko:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;500;700;800&family=Sora:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <style>

    :root {
      --font-head: 'Oxanium', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --bg: #000000;
      --surface: #151515;
      --surface-soft: rgba(255,255,255,0.03);
      --text: #f5f5f5;
      --muted: #9d9d9d;
      --line: rgba(255,255,255,0.14);
      --line-soft: rgba(255,255,255,0.08);
      --page: min(1500px, calc(100vw - 64px));
      --grid-size: 36px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button, input, textarea, select {
      font: inherit;
      color: inherit;
    }

    .page {
      width: 100%;
      position: relative;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(21, 21, 21, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line-soft);
    }

    .topbar__inner {
      width: var(--page);
      margin: 0 auto;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .brand__logo {
      height: 34px;
      width: auto;
    }

    .topbar__right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 22px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .nav a:hover,
    .nav a[aria-current="page"] {
      color: var(--text);
    }

    .language-switcher {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.76rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .language-switcher__flags {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .language-flag {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line-soft);
      padding: 4px;
      width: 38px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .language-flag:hover {
      border-color: var(--text);
      background: rgba(255,255,255,0.08);
    }

    .language-flag.active {
      border-color: var(--text);
      background: rgba(255,255,255,0.1);
    }

    .language-flag img {
      display: block;
      width: 22px;
      height: 16px;
      object-fit: cover;
    }

    .page-width {
      width: var(--page);
      margin: 0 auto;
    }

    .hero {
      min-height: calc(62vh - 68px);
      display: flex;
      align-items: center;
      padding: 48px 0 56px;
      position: relative;
    }

    .hero::before,
    .contact-shell::before,
    .contact-details::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.12) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.12) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
      pointer-events: none;
    }

    .hero::before {
      opacity: 0.34;
      mask-image: radial-gradient(circle at 28% 34%, black 30%, transparent 78%);
    }

    .hero__inner {
      width: 100%;
      max-width: 1100px;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: block;
      margin-bottom: 20px;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .text-canvas {
      display: block;
      width: 100%;
      height: auto;
      max-width: 100%;
    }

    .hero-title {
      margin-bottom: 20px;
      max-width: 1100px;
    }

    .hero-copy {
      max-width: 780px;
    }

    .contact-section {
      padding: 24px 0 120px;
      position: relative;
    }

    .contact-shell {
      position: relative;
      display: grid;
      grid-template-columns: minmax(320px, 1.15fr) minmax(260px, 0.85fr);
      gap: 40px;
      padding: 38px;
      border: 1px solid var(--line-soft);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      overflow: hidden;
    }

    .contact-shell::before {
      opacity: 0.18;
      mask-image: linear-gradient(to right, transparent 0%, black 16%, black 84%, transparent 100%);
    }

    .contact-form,
    .contact-details {
      position: relative;
      z-index: 1;
    }

    .contact-panel-tag,
    .contact-item__label {
      display: block;
      margin-bottom: 14px;
      font-family: var(--font-mono);
      font-size: 0.76rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .contact-form__title,
    .contact-details__title {
      margin: 0 0 14px;
      font-family: var(--font-head);
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .contact-form__copy,
    .contact-details__copy {
      margin: 0 0 28px;
      max-width: 62ch;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1rem;
    }

    .contact-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .field--full {
      grid-column: 1 / -1;
    }

    .field label {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line-soft);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 15px 16px;
      outline: none;
      transition: border-color 0.18s ease, background 0.18s ease;
    }

    .field textarea {
      min-height: 170px;
      resize: vertical;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: #7c7c7c;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.05);
    }

    .contact-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-top: 26px;
      flex-wrap: wrap;
    }

    .contact-note {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.7;
      max-width: 52ch;
    }

    .contact-submit {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 14px 22px;
      min-width: 176px;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
    }

    .contact-submit:hover {
      border-color: var(--text);
      background: rgba(255,255,255,0.09);
      transform: translateY(-1px);
    }

    .contact-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .contact-form-success {
      font-family: var(--font-mono);
      font-size: 0.84rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(217, 232, 18, 0.9);
      padding: 24px 0;
    }

    .contact-form-error {
      font-family: var(--font-mono);
      font-size: 0.76rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 80, 80, 0.85);
      margin-top: 12px;
      grid-column: 1 / -1;
    }

    .contact-details {
      padding: 26px;
      border: 1px solid var(--line-soft);
      background: var(--surface-soft);
      overflow: hidden;
    }

    .contact-details::before {
      opacity: 0.16;
      mask-image: radial-gradient(circle at 75% 15%, black 8%, transparent 68%);
    }

    .contact-items {
      display: grid;
      gap: 20px;
      margin-bottom: 28px;
    }

    .contact-item {
      position: relative;
      z-index: 1;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line-soft);
    }

    .contact-item:last-child {
      padding-bottom: 0;
      border-bottom: none;
    }

    .contact-item__value {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--text);
    }

    .contact-meta {
      display: grid;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .contact-meta__row {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      padding: 10px 0;
      border-top: 1px solid var(--line-soft);
      font-family: var(--font-mono);
      font-size: 0.76rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .contact-meta__row span:last-child {
      color: var(--text);
      text-align: right;
    }

    .footer {
      background: var(--surface);
      border-top: 1px solid var(--line-soft);
    }

    .footer__inner {
      width: var(--page);
      margin: 0 auto;
      padding: 52px 0 32px;
    }

    .footer__top {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 56px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--line-soft);
      align-items: start;
    }

    .footer__brand-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .footer__logo-link {
      display: inline-flex;
    }

    .footer__logo {
      height: 26px;
      width: auto;
      opacity: 0.8;
      transition: opacity 0.2s ease;
    }

    .footer__logo-link:hover .footer__logo {
      opacity: 1;
    }

    .footer__tagline {
      margin: 0;
      font-family: var(--font-mono);
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      max-width: 34ch;
      line-height: 1.75;
    }

    .footer__nav-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 0.74rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer__nav-col a:hover {
      color: var(--text);
    }

    .footer__doc-col {
      display: flex;
      flex-direction: column;
      min-width: 200px;
    }

    .footer__doc-row {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      padding: 9px 0;
      border-top: 1px solid var(--line-soft);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .footer__doc-row span:first-child {
      color: var(--muted);
    }

    .footer__doc-row span:last-child {
      color: var(--text);
      text-align: right;
    }

    .footer__bottom {
      padding-top: 24px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .contact-shell {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .nav {
        gap: 14px;
        font-size: 0.72rem;
      }

      .topbar__right {
        gap: 12px;
      }

      .footer__top {
        grid-template-columns: 1fr;
        gap: 36px;
      }

      .footer__doc-col {
        min-width: 0;
      }
    }

    @media (max-width: 680px) {
      :root {
        --page: min(100vw - 24px, 1500px);
        --grid-size: 28px;
      }

      .topbar__inner {
        min-height: 60px;
        align-items: flex-start;
        padding: 14px 0;
        flex-direction: column;
      }

      .topbar__right {
        width: 100%;
        justify-content: space-between;
      }

      .brand {
        font-size: 0.82rem;
      }

      .nav {
        display: none;
      }

      .hero {
        min-height: auto;
        padding: 40px 0 40px;
      }

      .contact-shell {
        padding: 20px;
      }

      .contact-form-grid {
        grid-template-columns: 1fr;
      }

      .contact-actions {
        align-items: flex-start;
      }

      .contact-submit {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="topbar__inner">
        <a href="/" class="brand" aria-label="Tenet Industries">
            <img src="/src/assets/logo.svg" alt="Tenet Industries" class="brand__logo" />
          </a>

        <div class="topbar__right">
          <nav class="nav">
            <a href="/#section-1" data-i18n="nav.platform"></a>
            <a href="/product" data-i18n="nav.product"></a>
            <a href="/#section-2" data-i18n="nav.systems"></a>
            <a href="/#section-3" data-i18n="nav.doctrine"></a>
            <a href="/contact" data-i18n="nav.contact" aria-current="page"></a>
          </nav>

          <div class="language-switcher" aria-label="Language selector">
            <div class="language-switcher__flags" id="language-select" role="group">
              <button type="button" class="language-flag" data-lang="en" aria-label="English">
                <img src="/src/assets/en.png" alt="English" />
              </button>

              <button type="button" class="language-flag" data-lang="sv" aria-label="Swedish">
                <img src="/src/assets/sv.svg" alt="Swedish" />
              </button>

              <button type="button" class="language-flag" data-lang="uk" aria-label="Ukrainian">
                <img src="/src/assets/uk.png" alt="Ukrainian" />
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="page-width">
      <header class="hero" id="top">
        <div class="hero__inner">
          <span class="eyebrow" data-i18n="contact.hero.eyebrow"></span>

          <canvas
            class="text-canvas hero-title pixel-reveal"
            data-i18n="contact.hero.title"
            data-font-size="118"
            data-max-width="1100"
            data-reveal="time"
            data-duration="1000"
          ></canvas>

          <canvas
            class="text-canvas hero-copy pixel-reveal"
            data-i18n="contact.hero.copy"
            data-font-size="26"
            data-max-width="780"
            data-weight="500"
            data-line-height="1.65"
            data-reveal="time"
            data-duration="1400"
          ></canvas>
        </div>
      </header>

      <main class="contact-section">
        <section class="contact-shell">
          <div class="contact-form">
            <span class="contact-panel-tag" data-i18n="contact.form.tag"></span>
            <h2 class="contact-form__title" data-i18n="contact.form.title"></h2>
            <p class="contact-form__copy" data-i18n="contact.form.copy"></p>

            <form class="contact-form-grid" action="#" method="post">
              <div class="field">
                <label for="contact-name" data-i18n="contact.form.fields.name.label"></label>
                <input id="contact-name" name="name" type="text" data-i18n-placeholder="contact.form.fields.name.placeholder" />
              </div>

              <div class="field">
                <label for="contact-email" data-i18n="contact.form.fields.email.label"></label>
                <input id="contact-email" name="email" type="email" data-i18n-placeholder="contact.form.fields.email.placeholder" />
              </div>

              <div class="field">
                <label for="contact-company" data-i18n="contact.form.fields.company.label"></label>
                <input id="contact-company" name="company" type="text" data-i18n-placeholder="contact.form.fields.company.placeholder" />
              </div>

              <div class="field">
                <label for="contact-subject" data-i18n="contact.form.fields.subject.label"></label>
                <input id="contact-subject" name="subject" type="text" data-i18n-placeholder="contact.form.fields.subject.placeholder" />
              </div>

              <div class="field field--full">
                <label for="contact-message" data-i18n="contact.form.fields.message.label"></label>
                <textarea id="contact-message" name="message" data-i18n-placeholder="contact.form.fields.message.placeholder"></textarea>
              </div>

              <div class="field field--full contact-actions">
                <p class="contact-note" data-i18n="contact.form.note"></p>
                <button class="contact-submit" type="submit" data-i18n="contact.form.submit"></button>
              </div>
            </form>
          </div>

          <aside class="contact-details">
            <span class="contact-panel-tag" data-i18n="contact.details.tag"></span>
            <h2 class="contact-details__title" data-i18n="contact.details.title"></h2>
            <p class="contact-details__copy" data-i18n="contact.details.copy"></p>

            <div class="contact-items">
              <div class="contact-item">
                <span class="contact-item__label" data-i18n="contact.details.items.email.label"></span>
                <div class="contact-item__value" data-i18n="contact.details.items.email.value"></div>
              </div>

              <div class="contact-item">
                <span class="contact-item__label" data-i18n="contact.details.items.phone.label"></span>
                <div class="contact-item__value" data-i18n="contact.details.items.phone.value"></div>
              </div>

              <div class="contact-item">
                <span class="contact-item__label" data-i18n="contact.details.items.location.label"></span>
                <div class="contact-item__value" data-i18n="contact.details.items.location.value"></div>
              </div>
            </div>

            <div class="contact-meta">
              <div class="contact-meta__row">
                <span data-i18n="contact.details.meta.response.label"></span>
                <span data-i18n="contact.details.meta.response.value"></span>
              </div>
              <div class="contact-meta__row">
                <span data-i18n="contact.details.meta.availability.label"></span>
                <span data-i18n="contact.details.meta.availability.value"></span>
              </div>
              <div class="contact-meta__row">
                <span data-i18n="contact.details.meta.security.label"></span>
                <span data-i18n="contact.details.meta.security.value"></span>
              </div>
            </div>
          </aside>
        </section>
      </main>
    </div>

    <footer class="footer">
      <div class="footer__inner">
        <div class="footer__top">
          <div class="footer__brand-col">
            <a href="/" class="footer__logo-link" aria-label="Tenet Industries">
              <img src="/src/assets/logo.svg" alt="Tenet Industries" class="footer__logo" />
            </a>
            <p class="footer__tagline" data-i18n="footer.tagline"></p>
          </div>
          <nav class="footer__nav-col">
            <a href="/#section-1" data-i18n="nav.platform"></a>
            <a href="/product" data-i18n="nav.product"></a>
            <a href="/#section-2" data-i18n="nav.systems"></a>
            <a href="/#section-3" data-i18n="nav.doctrine"></a>
            <a href="/contact" data-i18n="nav.contact"></a>
          </nav>
          <div class="footer__doc-col">
            <div class="footer__doc-row">
              <span data-i18n="footer.docCompany"></span>
              <span>Tenet Industries</span>
            </div>
            <div class="footer__doc-row">
              <span data-i18n="footer.docBacked"></span>
              <span>Y Combinator</span>
            </div>
          </div>
        </div>
        <div class="footer__bottom">
          <span data-i18n="footer.copyright"></span>
        </div>
      </div>
    </footer>
  </div>

  <script>
    const SUPPORTED_LANGUAGES = ['en', 'sv', 'uk'];
    const DEFAULT_LANGUAGE = 'en';
    const LOCALE_PATHS = {
      en: '../locales/en.json',
      sv: '../locales/sv.json',
      uk: '../locales/uk.json'
    };

    let translations = {};
    let textBlocks = [];

    function getNestedValue(object, path) {
      return path.split('.').reduce((acc, key) => {
        if (acc && Object.prototype.hasOwnProperty.call(acc, key)) {
          return acc[key];
        }
        return undefined;
      }, object);
    }

    function t(key) {
      const value = getNestedValue(translations, key);
      return typeof value === 'string' ? value : key;
    }

    async function loadTranslations(language) {
      const response = await fetch(LOCALE_PATHS[language]);
      if (!response.ok) {
        throw new Error(`Failed to load translations for ${language}`);
      }
      return response.json();
    }

    function applyStaticTranslations() {
      document.querySelectorAll('[data-i18n]:not(canvas)').forEach((element) => {
        const key = element.dataset.i18n;
        element.textContent = t(key);
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach((element) => {
        const key = element.dataset.i18nPlaceholder;
        element.setAttribute('placeholder', t(key));
      });

      document.title = t('contact.meta.title');
      document.documentElement.lang = localStorage.getItem('preferred-language') || DEFAULT_LANGUAGE;

      const switcher = document.getElementById('language-select');
      switcher.setAttribute('aria-label', t('language.ariaLabel'));
    }

    class PixelRevealText {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.offscreen = document.createElement('canvas');
        this.offCtx = this.offscreen.getContext('2d');
        this.tinyCanvas = document.createElement('canvas');
        this.tinyCtx = this.tinyCanvas.getContext('2d');

        this.text = canvas.dataset.text || '';
        this.baseFontSize = Number(canvas.dataset.fontSize || 48);
        this.fontSize = this.baseFontSize;
        this.maxWidth = Number(canvas.dataset.maxWidth || 800);
        this.fontWeight = canvas.dataset.weight || '800';
        this.lineHeight = Number(canvas.dataset.lineHeight || 1.2);
        this.revealMode = canvas.dataset.reveal || 'scroll';
        this.duration = Number(canvas.dataset.duration || 1000);

        this.color = getComputedStyle(document.documentElement)
          .getPropertyValue('--text')
          .trim();
        this.fontFamily = getComputedStyle(document.documentElement)
          .getPropertyValue('--font-head')
          .trim();
        this.bodyFamily = getComputedStyle(document.documentElement)
          .getPropertyValue('--font-body')
          .trim();

        this.initialPixelSize =
          (this.baseFontSize >= 100 ? 34 : this.baseFontSize >= 50 ? 24 : 16) * (window.devicePixelRatio || 1);

        this.pixelSize = this.initialPixelSize;
        this.targetPixelSize = this.initialPixelSize;
        this.padding = 18;
        this.startTime = performance.now();

        this.resize();
      }

      getFontFamily() {
        return this.baseFontSize <= 30 ? this.bodyFamily : this.fontFamily;
      }

      wrapText(ctx, text, maxWidth) {
        const words = text.split(' ');
        const lines = [];
        let current = '';

        for (const word of words) {
          const test = current ? `${current} ${word}` : word;
          if (ctx.measureText(test).width <= maxWidth || !current) {
            current = test;
          } else {
            lines.push(current);
            current = word;
          }
        }

        if (current) lines.push(current);
        return lines;
      }

      resize() {
        const container =
          this.canvas.closest('.hero__inner, .section__text, .contact-form, .contact-details') ||
          this.canvas.parentElement;
        const parentWidth = container.clientWidth;
        const mobile = window.innerWidth < 680;

        this.fontSize = mobile
          ? Math.min(
              this.baseFontSize,
              this.baseFontSize >= 100 ? 74 : this.baseFontSize >= 50 ? 44 : 20
            )
          : this.baseFontSize;

        const fontFamily = this.getFontFamily();
        const innerWidth = Math.max(120, Math.min(this.maxWidth, parentWidth));
        const measure = document.createElement('canvas').getContext('2d');
        measure.font = `${this.fontWeight} ${this.fontSize}px ${fontFamily}`;
        measure.textBaseline = 'alphabetic';

        const contentWidth = Math.max(80, innerWidth - this.padding * 2);
        const lines = this.wrapText(measure, this.text, contentWidth);
        const metrics = measure.measureText('Mg');
        const ascent = Math.ceil(metrics.actualBoundingBoxAscent || this.fontSize * 0.8);
        const descent = Math.ceil(metrics.actualBoundingBoxDescent || this.fontSize * 0.2);
        const lineBox = Math.ceil((ascent + descent) * this.lineHeight);
        const cssHeight = Math.max(40, lines.length * lineBox + this.padding * 2);
        const cssWidth = innerWidth;
        const dpr = window.devicePixelRatio || 1;
        const physW = Math.round(cssWidth * dpr);
        const physH = Math.round(cssHeight * dpr);

        this.canvas.width = physW;
        this.canvas.height = physH;
        this.canvas.style.width = `${cssWidth}px`;
        this.canvas.style.height = `${cssHeight}px`;

        this.offscreen.width = physW;
        this.offscreen.height = physH;

        const ctx = this.offCtx;
        ctx.clearRect(0, 0, physW, physH);
        ctx.fillStyle = this.color;
        ctx.textBaseline = 'alphabetic';
        ctx.textAlign = 'left';
        ctx.font = `${this.fontWeight} ${this.fontSize * dpr}px ${fontFamily}`;

        lines.forEach((line, index) => {
          const y = Math.round((this.padding + ascent + index * lineBox) * dpr);
          ctx.fillText(line, Math.round(this.padding * dpr), y);
        });

        this.draw();
      }

      setScrollProgress(progress) {
        if (this.revealMode !== 'scroll') return;
        const eased = 1 - Math.pow(1 - progress, 3);
        this.targetPixelSize = Math.max(1, this.initialPixelSize * (1 - eased));
      }

      update(now) {
        if (this.revealMode === 'time') {
          const t = Math.min((now - this.startTime) / this.duration, 1);
          const eased = 1 - Math.pow(1 - t, 3);
          this.targetPixelSize = Math.max(1, this.initialPixelSize * (1 - eased));
        }

        this.pixelSize += (this.targetPixelSize - this.pixelSize) * 0.14;

        if (Math.abs(this.pixelSize - this.targetPixelSize) < 0.08) {
          this.pixelSize = this.targetPixelSize;
        }

        this.draw();
      }

      draw() {
        const w = this.canvas.width;
        const h = this.canvas.height;
        this.ctx.clearRect(0, 0, w, h);

        const scaledW = Math.max(1, Math.ceil(w / Math.max(1, this.pixelSize)));
        const scaledH = Math.max(1, Math.ceil(h / Math.max(1, this.pixelSize)));
        const tinyPad = 2;
        const tinyW = scaledW + tinyPad * 2;
        const tinyH = scaledH + tinyPad * 2;

        if (this.tinyCanvas.width !== tinyW || this.tinyCanvas.height !== tinyH) {
          this.tinyCanvas.width = tinyW;
          this.tinyCanvas.height = tinyH;
        }

        this.tinyCtx.clearRect(0, 0, tinyW, tinyH);
        this.tinyCtx.imageSmoothingEnabled = false;
        this.tinyCtx.drawImage(
          this.offscreen,
          0,
          0,
          w,
          h,
          tinyPad,
          tinyPad,
          scaledW,
          scaledH
        );

        this.ctx.imageSmoothingEnabled = false;
        this.ctx.drawImage(this.tinyCanvas, 0, 0, tinyW, tinyH, 0, 0, w, h);
      }
    }

    function destroyTextBlocks() {
      textBlocks = [];
    }

    function initTextBlocks() {
      destroyTextBlocks();
      document.querySelectorAll('canvas[data-i18n]').forEach((canvas) => {
        canvas.dataset.text = t(canvas.dataset.i18n);
      });
      textBlocks = Array.from(document.querySelectorAll('.pixel-reveal')).map(
        (canvas) => new PixelRevealText(canvas)
      );
    }

    async function waitForFont(spec, maxWait = 4000) {
      const deadline = Date.now() + maxWait;
      while (Date.now() < deadline) {
        const loaded = await document.fonts.load(spec);
        if (loaded.length > 0) return;
        await new Promise(r => setTimeout(r, 50));
      }
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function updateScrollRevealTargets() {
      textBlocks.forEach((block) => {
        if (block.revealMode !== 'scroll') return;

        const rect = block.canvas.getBoundingClientRect();
        const start = window.innerHeight * 0.94;
        const end = window.innerHeight * 0.38;
        const progress = clamp((start - rect.top) / (start - end), 0, 1);
        block.setScrollProgress(progress);
      });
    }

    function animate(now) {
      updateScrollRevealTargets();
      textBlocks.forEach((block) => block.update(now));
      requestAnimationFrame(animate);
    }

    async function setLanguage(language) {
      const safeLanguage = SUPPORTED_LANGUAGES.includes(language) ? language : DEFAULT_LANGUAGE;
      translations = await loadTranslations(safeLanguage);
      localStorage.setItem('preferred-language', safeLanguage);
      document.querySelectorAll('.language-flag').forEach((button) => {
        button.classList.toggle('active', button.dataset.lang === safeLanguage);
      });
      applyStaticTranslations();
      await waitForFont('800 1em Oxanium');
      initTextBlocks();
      updateScrollRevealTargets();
    }

    function getInitialLanguage() {
      const stored = localStorage.getItem('preferred-language');
      if (SUPPORTED_LANGUAGES.includes(stored)) return stored;

      const browserLanguage = (navigator.language || DEFAULT_LANGUAGE).slice(0, 2).toLowerCase();
      return SUPPORTED_LANGUAGES.includes(browserLanguage) ? browserLanguage : DEFAULT_LANGUAGE;
    }

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        textBlocks.forEach((block) => block.resize());
      }, 80);
    });

    document.querySelectorAll('.language-flag').forEach((button) => {
      button.addEventListener('click', async () => {
        await setLanguage(button.dataset.lang);
      });
    });

    setLanguage(getInitialLanguage())
      .then(() => {
        requestAnimationFrame(animate);
      })
      .catch(async (error) => {
        console.error(error);
        if (getInitialLanguage() !== DEFAULT_LANGUAGE) {
          await setLanguage(DEFAULT_LANGUAGE);
          requestAnimationFrame(animate);
        }
      });

    const form = document.querySelector('.contact-form-grid');
    const submitBtn = form && form.querySelector('.contact-submit');

    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        submitBtn.disabled = true;
        submitBtn.textContent = '...';

        const data = {
          name: form.querySelector('[name="name"]').value.trim(),
          email: form.querySelector('[name="email"]').value.trim(),
          company: form.querySelector('[name="company"]').value.trim(),
          subject: form.querySelector('[name="subject"]').value.trim(),
          message: form.querySelector('[name="message"]').value.trim(),
        };

        try {
          const res = await fetch('/api/contact', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
          });

          if (res.ok) {
            form.innerHTML = '<p class="contact-form-success">Message sent. We\'ll respond within 24 hours.</p>';
          } else {
            throw new Error('Server error');
          }
        } catch {
          submitBtn.disabled = false;
          submitBtn.textContent = t('contact.form.submit');
          const existing = form.querySelector('.contact-form-error');
          if (!existing) {
            const err = document.createElement('p');
            err.className = 'contact-form-error';
            err.textContent = 'Failed to send. Please try again or email us directly.';
            form.appendChild(err);
          }
        }
      });
    }
  </script>
</body>
</html>
