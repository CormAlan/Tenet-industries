<!DOCTYPE html>
<html lang="en">
<head>
  <script defer src="/_vercel/insights/script.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product - Tenet Industries</title>
  <meta property="og:title" content="Product – Tenet Industries" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tenetindustries.com/product" />
  <meta property="og:image" content="https://tenetindustries.com/src/assets/Tenet_OG.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://tenetindustries.com/src/assets/Tenet_OG.png" />
  <link rel="icon" href="/src/assets/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap">
  <style>

    :root {
      --font-head: 'Oxanium', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --bg: #000000;
      --surface: #151515;
      --text: #f5f5f5;
      --muted: #9d9d9d;
      --line: rgba(217, 232, 18, 0.16);
      --line-soft: rgba(255,255,255,0.08);
      --page: min(1500px, calc(100vw - 64px));
      --grid-size: 36px;
    }

    * { box-sizing: border-box; }
    html {
      scroll-behavior: smooth;
      scroll-padding-top: 92px;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; color: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(21, 21, 21, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line-soft);
    }

    .topbar__inner {
      width: var(--page);
      margin: 0 auto;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .brand__logo {
      height: 34px;
      width: auto;
    }

    .topbar__right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 22px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .nav a:hover,
    .nav a[aria-current="page"] { color: var(--text); }

    .language-switcher__flags {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .language-flag {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line-soft);
      padding: 4px;
      width: 38px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .language-flag:hover,
    .language-flag.active {
      border-color: var(--text);
      background: rgba(255,255,255,0.1);
    }

    .language-flag img {
      display: block;
      width: 22px;
      height: 16px;
      object-fit: cover;
    }

    .page-width {
      width: var(--page);
      margin: 0 auto;
    }

    .product-hero {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(360px, 0.78fr);
      gap: clamp(48px, 6vw, 110px);
      align-items: center;
      min-height: calc(78vh - 68px);
      padding: 70px 0 58px;
      overflow: hidden;
    }

    .product-hero::before,
    .product-section::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(226, 233, 34, 0.055) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
      opacity: 0.34;
      pointer-events: none;
      mask-image: linear-gradient(to right, black 0%, black 70%, transparent 100%);
    }

    .hero-copy,
    .hero-visual,
    .product-section__inner {
      position: relative;
      z-index: 1;
    }

    .eyebrow,
    .section-label,
    .stat__label,
    .capability__index,
    .roadmap__phase {
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
    }

    .eyebrow {
      display: block;
      margin-bottom: 18px;
      font-size: 0.78rem;
    }

    h1,
    h2,
    h3,
    p { margin-top: 0; }

    h1 {
      margin-bottom: 24px;
      max-width: 760px;
      font-family: var(--font-head);
      font-size: clamp(3.3rem, 5.7vw, 5.9rem);
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .hero-copy__lead {
      max-width: 680px;
      margin-bottom: 34px;
      color: #d8d8d8;
      font-size: clamp(1.06rem, 1.45vw, 1.32rem);
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border: 1px solid rgba(255,255,255,0.14);
      padding: 12px 18px;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      background: rgba(255,255,255,0.035);
      transition: border-color 0.18s ease, background 0.18s ease;
    }

    .button:hover {
      border-color: rgba(217, 232, 18, 0.46);
      background: rgba(217, 232, 18, 0.075);
    }

    .hero-visual {
      border: 1px solid var(--line);
      min-height: 460px;
      background:
        linear-gradient(to right, rgba(255,255,255,0.055) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 32px 32px;
      background-color: rgba(0,0,0,0.22);
      box-shadow:
        0 28px 80px rgba(0,0,0,0.36),
        inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .hero-video {
      width: 100%;
      height: 460px;
      display: block;
      object-fit: cover;
      background: #000;
    }

    .hero-visual__caption {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding: 0 24px 22px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
      background: rgba(255,255,255,0.018);
    }

    .stat {
      padding: 24px;
      border-right: 1px solid var(--line-soft);
    }

    .stat:last-child { border-right: none; }

    .stat__value {
      margin-bottom: 8px;
      font-family: var(--font-head);
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 1;
      text-transform: uppercase;
    }

    .stat__label { font-size: 0.68rem; }

    .product-section {
      position: relative;
      padding: 96px 0;
      border-bottom: 1px solid var(--line-soft);
      overflow: hidden;
    }

    #product {
      margin: 32px 0 0;
      background:
        radial-gradient(circle at 18% 42%, rgba(217, 232, 18, 0.07), transparent 32%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.016) 50%, rgba(0, 0, 0, 0.24));
      border-top: 1px solid rgba(255, 255, 255, 0.085);
      border-bottom: 1px solid rgba(255, 255, 255, 0.065);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.045),
        inset 0 -40px 80px rgba(0, 0, 0, 0.22);
    }

    #product::before {
      opacity: 0.42;
      mask-image: linear-gradient(to right, transparent 0%, black 14%, black 86%, transparent 100%);
    }

    .product-section__header {
      display: grid;
      grid-template-columns: minmax(0, 0.8fr) minmax(300px, 0.7fr);
      gap: 56px;
      align-items: end;
      margin-bottom: 44px;
    }

    .section-label {
      display: block;
      margin-bottom: 16px;
      font-size: 0.76rem;
    }

    h2 {
      margin-bottom: 0;
      max-width: 760px;
      font-family: var(--font-head);
      font-size: clamp(2.4rem, 4.8vw, 5.2rem);
      line-height: 1;
      text-transform: uppercase;
    }

    .section-intro {
      margin-bottom: 0;
      color: #d0d0d0;
      line-height: 1.75;
      font-size: 1.02rem;
    }

    .spec-layout {
      display: grid;
      grid-template-columns: minmax(280px, 0.8fr) minmax(0, 1fr);
      gap: 34px;
      align-items: stretch;
    }

    .spec-table,
    .capabilities,
    .roadmap {
      border: 1px solid var(--line-soft);
      background: rgba(255,255,255,0.022);
    }

    .spec-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line-soft);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .spec-row:last-child { border-bottom: none; }

    .spec-row span:first-child { color: var(--muted); }
    .spec-row span:last-child { text-align: right; }

    .capabilities {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .capability {
      padding: 24px;
      border-right: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
    }

    .capability:nth-child(2n) { border-right: none; }
    .capability:nth-last-child(-n + 2) { border-bottom: none; }

    .capability__index {
      display: block;
      margin-bottom: 18px;
      font-size: 0.68rem;
      color: rgba(217, 232, 18, 0.68);
    }

    .capability h3 {
      margin-bottom: 12px;
      font-family: var(--font-head);
      font-size: 1.22rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .capability p {
      margin-bottom: 0;
      color: #cfcfcf;
      line-height: 1.7;
    }

    .roadmap {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .roadmap__item {
      position: relative;
      min-height: 280px;
      padding: 26px;
      border-right: 1px solid var(--line-soft);
    }

    .roadmap__item:last-child { border-right: none; }

    .roadmap__item::before {
      content: "";
      position: absolute;
      top: 34px;
      left: 26px;
      width: 7px;
      height: 7px;
      background: rgba(217, 232, 18, 0.92);
      box-shadow: 0 0 14px rgba(217, 232, 18, 0.36);
    }

    .roadmap__item--now::before {
      background: #63d471;
      box-shadow: 0 0 14px rgba(99, 212, 113, 0.36);
    }

    .roadmap__item--next::before {
      background: #d9e812;
      box-shadow: 0 0 14px rgba(217, 232, 18, 0.36);
    }

    .roadmap__item--dev::before {
      background: #ff9f1c;
      box-shadow: 0 0 14px rgba(255, 159, 28, 0.34);
    }

    .roadmap__item--future::before {
      background: #ff4d4d;
      box-shadow: 0 0 14px rgba(255, 77, 77, 0.34);
    }

    .roadmap__phase {
      display: block;
      margin-bottom: 56px;
      padding-left: 22px;
      font-size: 0.68rem;
    }

    .roadmap h3 {
      margin-bottom: 12px;
      font-family: var(--font-head);
      font-size: 1.3rem;
      text-transform: uppercase;
    }

    .roadmap p {
      margin-bottom: 0;
      color: #cfcfcf;
      line-height: 1.7;
    }

    /* ── mobile nav ── */
    .nav-toggle {
      display: none;
      background: none;
      border: 1px solid var(--line-soft);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 5px 10px;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.18s ease, color 0.18s ease;
    }
    .nav-toggle:hover { border-color: var(--text); color: var(--text); }

    .mobile-nav {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(12, 12, 12, 0.98);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line-soft);
      z-index: 48;
    }
    .mobile-nav.is-open { display: block; }
    .mobile-nav a {
      display: block;
      padding: 14px 16px;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--line-soft);
    }
    .mobile-nav a:last-child { border-bottom: none; }
    .mobile-nav a:hover { color: var(--text); }

    @media (max-width: 680px) {
      .nav-toggle { display: block; }
    }

    .footer {
      background: var(--surface);
      border-top: 1px solid var(--line-soft);
    }

    .footer__inner {
      width: var(--page);
      margin: 0 auto;
      padding: 52px 0 32px;
    }

    .footer__top {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 56px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--line-soft);
      align-items: start;
    }

    .footer__brand-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .footer__logo-link { display: inline-flex; }

    .footer__logo {
      height: 26px;
      width: auto;
      opacity: 0.8;
    }

    .footer__tagline {
      margin: 0;
      max-width: 34ch;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      line-height: 1.75;
      text-transform: uppercase;
    }

    .footer__nav-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.74rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .footer__nav-col a:hover { color: var(--text); }

    .footer__doc-col {
      display: flex;
      flex-direction: column;
      min-width: 200px;
    }

    .footer__doc-row {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      padding: 9px 0;
      border-top: 1px solid var(--line-soft);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .footer__doc-row span:first-child { color: var(--muted); }
    .footer__doc-row span:last-child { text-align: right; }

    .footer__bottom {
      padding-top: 24px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @media (max-width: 980px) {
      .product-hero,
      .product-section__header,
      .spec-layout,
      .roadmap {
        grid-template-columns: 1fr;
      }

      .stat-strip,
      .capabilities {
        grid-template-columns: repeat(2, 1fr);
      }

      .roadmap__item {
        min-height: auto;
        border-right: none;
        border-bottom: 1px solid var(--line-soft);
      }

      .roadmap__item:last-child { border-bottom: none; }

      .footer__top {
        grid-template-columns: 1fr;
        gap: 36px;
      }
    }

    @media (max-width: 680px) {
      :root {
        --page: min(100vw - 24px, 1500px);
        --grid-size: 28px;
      }

      html { scroll-padding-top: 180px; }

      .topbar__inner {
        min-height: 60px;
        align-items: flex-start;
        padding: 14px 0;
        flex-direction: column;
      }

      .topbar__right {
        width: 100%;
        justify-content: space-between;
      }

      .nav { display: none; }

      .product-hero {
        min-height: auto;
        padding: 48px 0 40px;
        gap: 34px;
      }

      h1 {
        max-width: 100%;
        font-size: 2.45rem;
        line-height: 1.04;
      }

      .hero-copy__lead {
        font-size: 1rem;
        line-height: 1.65;
      }

      .hero-visual,
      .hero-video {
        min-height: 320px;
        height: 320px;
      }

      .hero-visual__caption {
        padding: 0 18px 18px;
        flex-direction: column;
        gap: 8px;
      }

      .stat-strip,
      .capabilities {
        grid-template-columns: 1fr;
      }

      .stat,
      .capability {
        border-right: none;
      }

      .capability:nth-last-child(2) { border-bottom: 1px solid var(--line-soft); }

      .product-section {
        padding: 70px 0;
      }

      .spec-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .spec-row span:last-child { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar__inner">
      <a href="/" class="brand" aria-label="Tenet Industries">
        <img src="/src/assets/logo.svg" alt="Tenet Industries" class="brand__logo" />
      </a>

      <div class="topbar__right">
        <nav class="nav">
          <a href="/#section-1" data-i18n="nav.platform"></a>
          <a href="/product" data-i18n="nav.product" aria-current="page"></a>
          <a href="/#section-2" data-i18n="nav.systems"></a>
          <a href="/#section-3" data-i18n="nav.doctrine"></a>
          <a href="/contact" data-i18n="nav.contact"></a>
        </nav>
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">Menu</button>

        <div class="language-switcher" aria-label="Language selector">
          <div class="language-switcher__flags" id="language-select" role="group">
            <button type="button" class="language-flag" data-lang="en" aria-label="English">
              <img src="/src/assets/en.png" alt="English" />
            </button>
            <button type="button" class="language-flag" data-lang="sv" aria-label="Swedish">
              <img src="/src/assets/sv.svg" alt="Swedish" />
            </button>
            <button type="button" class="language-flag" data-lang="uk" aria-label="Ukrainian">
              <img src="/src/assets/uk.png" alt="Ukrainian" />
            </button>
          </div>
        </div>
      </div>
      <nav class="mobile-nav" id="mobile-nav">
        <a href="/#section-1" data-i18n="nav.platform"></a>
        <a href="/product" data-i18n="nav.product"></a>
        <a href="/#section-2" data-i18n="nav.systems"></a>
        <a href="/#section-3" data-i18n="nav.doctrine"></a>
        <a href="/contact" data-i18n="nav.contact"></a>
      </nav>
    </div>
  </div>

  <main>
    <div class="page-width">
      <header class="product-hero">
        <div class="hero-copy">
          <span class="eyebrow" data-i18n="product.hero.eyebrow"></span>
          <h1 data-i18n="product.hero.title"></h1>
          <p class="hero-copy__lead" data-i18n="product.hero.copy"></p>
          <div class="hero-actions">
            <a class="button" href="#product" data-i18n="product.hero.productCta"></a>
            <a class="button" href="#roadmap" data-i18n="product.hero.roadmapCta"></a>
          </div>
        </div>

        <aside class="hero-visual" aria-label="Drone product footage">
          <video
            class="hero-video"
            src="/tenet_website.mp4"
            autoplay
            muted
            loop
            playsinline
            preload="auto"
          ></video>
          <div class="hero-visual__caption">
            <span data-i18n="product.hero.modelLabel"></span>
            <span data-i18n="product.hero.modelStatus"></span>
          </div>
        </aside>
      </header>

      <section class="stat-strip" aria-label="Drone key specifications">
        <div class="stat">
          <div class="stat__value" data-i18n="product.stats.range.value"></div>
          <div class="stat__label" data-i18n="product.stats.range.label"></div>
        </div>
        <div class="stat">
          <div class="stat__value" data-i18n="product.stats.payload.value"></div>
          <div class="stat__label" data-i18n="product.stats.payload.label"></div>
        </div>
        <div class="stat">
          <div class="stat__value" data-i18n="product.stats.flight.value"></div>
          <div class="stat__label" data-i18n="product.stats.flight.label"></div>
        </div>
        <div class="stat">
          <div class="stat__value" data-i18n="product.stats.assembly.value"></div>
          <div class="stat__label" data-i18n="product.stats.assembly.label"></div>
        </div>
      </section>
    </div>

    <section class="product-section" id="product">
      <div class="page-width product-section__inner">
        <div class="product-section__header">
          <div>
            <span class="section-label" data-i18n="product.productSection.label"></span>
            <h2 data-i18n="product.productSection.title"></h2>
          </div>
          <p class="section-intro" data-i18n="product.productSection.copy"></p>
        </div>

        <div class="spec-layout">
          <div class="spec-table">
            <div class="spec-row">
              <span data-i18n="product.specs.propellers.label"></span>
              <span data-i18n="product.specs.propellers.value"></span>
            </div>
            <div class="spec-row">
              <span data-i18n="product.specs.range.label"></span>
              <span data-i18n="product.specs.range.value"></span>
            </div>

  <script>
    const SUPPORTED_LANGUAGES = ['en', 'sv', 'uk'];
    const ENABLED_LANGUAGES = ['en', 'sv']; // add 'uk' to re-enable Ukrainian
    const DEFAULT_LANGUAGE = 'en';
    const LOCALE_PATHS = {
      en: '../locales/en.json',
      sv: '../locales/sv.json',
      uk: '../locales/uk.json'
    };

    let translations = {};

    function getNestedValue(object, path) {
      return path.split('.').reduce((acc, key) => {
        if (acc && Object.prototype.hasOwnProperty.call(acc, key)) {
          return acc[key];
        }
        return undefined;
      }, object);
    }

    function t(key) {
      const value = getNestedValue(translations, key);
      return typeof value === 'string' ? value : key;
    }

    async function loadTranslations(language) {
      const response = await fetch(LOCALE_PATHS[language]);
      if (!response.ok) {
        throw new Error(`Failed to load translations for ${language}`);
      }
      return response.json();
    }

    function applyStaticTranslations(language) {
      document.querySelectorAll('[data-i18n]').forEach((element) => {
        element.textContent = t(element.dataset.i18n);
      });

      document.title = t('product.meta.title');
      document.documentElement.lang = language;

      const switcher = document.getElementById('language-select');
      switcher.setAttribute('aria-label', t('language.ariaLabel'));
    }

    async function setLanguage(language) {
      const safeLanguage = SUPPORTED_LANGUAGES.includes(language) ? language : DEFAULT_LANGUAGE;
      translations = await loadTranslations(safeLanguage);
      localStorage.setItem('preferred-language', safeLanguage);
      document.querySelectorAll('.language-flag').forEach((button) => {
        button.classList.toggle('active', button.dataset.lang === safeLanguage);
      });
      applyStaticTranslations(safeLanguage);
    }

    function getInitialLanguage() {
      const stored = localStorage.getItem('preferred-language');
      if (ENABLED_LANGUAGES.includes(stored)) return stored;

      const browserLanguage = (navigator.language || DEFAULT_LANGUAGE).slice(0, 2).toLowerCase();
      return ENABLED_LANGUAGES.includes(browserLanguage) ? browserLanguage : DEFAULT_LANGUAGE;
    }

    document.querySelectorAll('.language-flag').forEach((button) => {
      if (!ENABLED_LANGUAGES.includes(button.dataset.lang)) {
        button.style.display = 'none';
        return;
      }
      button.addEventListener('click', async () => {
        await setLanguage(button.dataset.lang);
      });
    });

    const navToggle = document.querySelector('.nav-toggle');
    const mobileNav = document.getElementById('mobile-nav');
    if (navToggle && mobileNav) {
      navToggle.addEventListener('click', () => {
        const open = mobileNav.classList.toggle('is-open');
        navToggle.textContent = open ? 'Close' : 'Menu';
        navToggle.setAttribute('aria-expanded', open);
      });
      mobileNav.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
          mobileNav.classList.remove('is-open');
          navToggle.textContent = 'Menu';
          navToggle.setAttribute('aria-expanded', 'false');
        });
      });
    }

    setLanguage(getInitialLanguage()).catch(async (error) => {
      console.error(error);
      if (getInitialLanguage() !== DEFAULT_LANGUAGE) {
        await setLanguage(DEFAULT_LANGUAGE);
      }
    });
  </script>
