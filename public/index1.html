<!DOCTYPE html>
<html lang="sv">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Pixel Scroll Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Teko:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;500;700;800&family=Sora:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

    :root {
      --font-head: 'Oxanium', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --bg: #000000;
      --surface: #151515;
      --text: #f5f5f5;
      --muted: #9d9d9d;
      --line: rgba(217, 232, 18, 0.14);
      --line-soft: rgba(255,255,255,0.08);
      --page: min(1500px, calc(100vw - 64px));
      --grid-size: 36px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button, select {
      font: inherit;
      color: inherit;
    }

    .page {
      width: 100%;
      position: relative;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(21, 21, 21, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line-soft);
    }

    .topbar__inner {
      width: var(--page);
      margin: 0 auto;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      font-family: var(--font-head);
      font-size: 0.94rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .topbar__right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 22px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .nav a:hover { color: var(--text); }

    .language-switcher {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.76rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .language-switcher__flags {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .language-flag {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line-soft);
      padding: 4px;
      width: 38px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .language-flag:hover {
      border-color: var(--text);
      background: rgba(255,255,255,0.08);
    }

    .language-flag.active {
      border-color: var(--text);
      background: rgba(255,255,255,0.1);
    }

    .language-flag img {
      display: block;
      width: 22px;
      height: 16px;
      object-fit: cover;
    }

    .page-width {
      width: var(--page);
      margin: 0 auto;
    }

    .hero {
      min-height: calc(80vh - 68px);
      display: flex;
      align-items: center;
      padding: 48px 0 24px;
      position: relative;
      width: 100vw;
      left: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(238, 245, 30, 0.42) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(183, 213, 9, 0.24) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.72;
      pointer-events: none;
      mask-image: radial-gradient(circle at 28% 34%, black 52%, transparent 100%);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(
          90deg,
          transparent 0%,
          rgba(220, 255, 80, 0.00) 44%,
          rgba(220, 255, 80, 0.05) 48%,
          rgba(220, 255, 80, 0.12) 50%,
          rgba(220, 255, 80, 0.05) 52%,
          rgba(220, 255, 80, 0.00) 56%,
          transparent 100%
        );
      animation: heroScan 10s linear infinite;
    }
    @keyframes heroScan {
      from {
        transform: translateX(-35%);
      }
      to {
        transform: translateX(35%);
      }
    }

    .hero__inner {
      width: var(--page);
      max-width: none;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .eyebrow {
      display: block;
      margin-bottom: 20px;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .text-canvas {
      display: block;
      width: 100%;
      height: auto;
      max-width: 100%;
    }

    .hero-title {
      margin-bottom: 20px;
      max-width: 1100px;
    }

    .hero-copy {
      max-width: 820px;
    }

    .sections {
      padding: 24px 0 120px;
    }

    .section {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 40vw);
      gap: 72px;
      align-items: center;
      padding: 56px 0;
      overflow: hidden;
    }
    .section__model {
      width: 100%;
      height: 100%;
      min-height: 360px;
      display: block;
      background: transparent;
    }

    .section__media-label--overlay {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 2;
    }
    .section--reverse {
      grid-template-columns: minmax(260px, 40vw) minmax(0, 1fr);
    }

    .section::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(226, 233, 34, 0.07) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
      opacity: 0.20;
      pointer-events: none;
      mask-image: linear-gradient(to right, transparent 0%, black 18%, black 82%, transparent 100%);
    }

    .section:nth-of-type(2)::before { opacity: 0.28; }

    .section__text,
    .section__media {
      position: relative;
      z-index: 1;
      min-width: 0;
    }

    .section__tag {
      display: block;
      margin-bottom: 18px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .section__title {
      margin-bottom: 18px;
      max-width: 780px;
    }

    .section__body {
      max-width: 760px;
    }

    .section__media {
      min-height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 32px 32px;
      background-color: rgba(255,255,255,0.01);
      overflow: hidden;
    }

    .section__video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .section__media-label {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(0,0,0,0.65);
      padding: 10px 14px;
    }

    .footer {
      background: var(--surface);
      border-top: 1px solid var(--line-soft);
    }

    .footer__inner {
      width: var(--page);
      margin: 0 auto;
      min-height: 88px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      font-family: var(--font-mono);
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .nav {
        gap: 14px;
        font-size: 0.72rem;
      }

      .topbar__right {
        gap: 12px;
      }

      .section,
      .section--reverse {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .hero {
        min-height: 82vh;
      }

      .footer__inner {
        min-height: auto;
        padding: 28px 0;
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 680px) {
      :root {
        --page: min(100vw - 24px, 1500px);
        --grid-size: 28px;
      }

      .topbar__inner {
        min-height: 60px;
        align-items: flex-start;
        padding: 14px 0;
        flex-direction: column;
      }

      .topbar__right {
        width: 100%;
        justify-content: space-between;
      }

      .brand {
        font-size: 0.82rem;
      }

      .nav {
        display: none;
      }

      .section {
        padding: 56px 0;
      }

      .section__media {
        min-height: 240px;
      }
    }
  </style>

</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="topbar__inner">
        <a href="#top" class="brand" data-i18n="brand"></a>

        <div class="topbar__right">
          <nav class="nav">
            <a href="#section-1" data-i18n="nav.platform"></a>
            <a href="#section-2" data-i18n="nav.systems"></a>
            <a href="#section-3" data-i18n="nav.doctrine"></a>
            <a href="/contact" data-i18n="nav.contact"></a>
          </nav>

          <div class="language-switcher" aria-label="Language selector">
            <div class="language-switcher__flags" id="language-select" role="group">

    <div class="page-width">

            data-font-size="132"
            data-max-width="1100"

            data-duration="1000"
          ></canvas>

          <canvas
            class="text-canvas hero-copy pixel-reveal"
            data-i18n="hero.copy"
            data-font-size="28"
            data-max-width="820"
            data-weight="500"
            data-line-height="1.6"
            data-reveal="time"
            data-duration="1400"
          ></canvas>
        </div>
      </header>

      <main class="sections">
        <section class="section" id="section-1">

          </div>
          <div class="section__text">
            <span class="section__tag" data-i18n="sections.section2.tag"></span>
            <canvas
              class="text-canvas section__title pixel-reveal"
              data-i18n="sections.section2.title"
              data-font-size="64"
              data-max-width="780"
              data-reveal="scroll"
            ></canvas>
            <canvas
              class="text-canvas section__body pixel-reveal"

        </section>

        <section class="section" id="section-3">
          <div class="section__text">
            <span class="section__tag" data-i18n="sections.section3.tag"></span>
            <canvas
              class="text-canvas section__title pixel-reveal"
              data-i18n="sections.section3.title"
              data-font-size="64"
              data-max-width="780"
              data-reveal="scroll"
            ></canvas>
            <canvas
              class="text-canvas section__body pixel-reveal"
              data-i18n="sections.section3.body"
              data-font-size="24"

    <footer class="footer">
      <div class="footer__inner">
        <span data-i18n="footer.heroReveal"></span>
        <span data-i18n="footer.sectionReveal"></span>
      </div>
    </footer>
  </div>

  <script>
    const SUPPORTED_LANGUAGES = ['en', 'sv', 'uk'];
    const DEFAULT_LANGUAGE = 'en';
    const LOCALE_PATHS = {
      en: './locales/en.json',
      sv: './locales/sv.json',
      uk: './locales/uk.json'
    };

    let translations = {};
    let textBlocks = [];

    function getNestedValue(object, path) {
      return path.split('.').reduce((acc, key) => {
        if (acc && Object.prototype.hasOwnProperty.call(acc, key)) {
          return acc[key];
        }
        return undefined;
      }, object);
    }

    function t(key) {
      const value = getNestedValue(translations, key);
      return typeof value === 'string' ? value : key;
    }

    async function loadTranslations(language) {
      const response = await fetch(LOCALE_PATHS[language]);
      if (!response.ok) {
        throw new Error(`Failed to load translations for ${language}`);
      }
      return response.json();
    }

    function applyStaticTranslations() {
      document.querySelectorAll('[data-i18n]:not(canvas)').forEach((element) => {
        const key = element.dataset.i18n;
        element.textContent = t(key);
      });

      document.title = t('meta.title');
      document.documentElement.lang = localStorage.getItem('preferred-language') || DEFAULT_LANGUAGE;

      const switcher = document.getElementById('language-select');
      switcher.setAttribute('aria-label', t('language.ariaLabel'));
    }

    class PixelRevealText {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.offscreen = document.createElement('canvas');
        this.offCtx = this.offscreen.getContext('2d');
        this.tinyCanvas = document.createElement('canvas');
        this.tinyCtx = this.tinyCanvas.getContext('2d');

        this.text = canvas.dataset.text || '';
        this.baseFontSize = Number(canvas.dataset.fontSize || 48);
        this.fontSize = this.baseFontSize;
        this.maxWidth = Number(canvas.dataset.maxWidth || 800);
        this.fontWeight = canvas.dataset.weight || '800';
        this.lineHeight = Number(canvas.dataset.lineHeight || 1.2);
        this.revealMode = canvas.dataset.reveal || 'scroll';
        this.duration = Number(canvas.dataset.duration || 1000);

        this.color = getComputedStyle(document.documentElement)
          .getPropertyValue('--text')
          .trim();
        this.fontFamily = getComputedStyle(document.documentElement)
          .getPropertyValue('--font-head')
          .trim();
        this.bodyFamily = getComputedStyle(document.documentElement)
          .getPropertyValue('--font-body')
          .trim();

        this.initialPixelSize =
          this.baseFontSize >= 100 ? 34 : this.baseFontSize >= 50 ? 24 : 16;

        this.pixelSize = this.initialPixelSize;
        this.targetPixelSize = this.initialPixelSize;
        this.padding = 18;
        this.startTime = performance.now();

        this.resize();
      }

      getFontFamily() {
        return this.baseFontSize <= 30 ? this.bodyFamily : this.fontFamily;
      }

      wrapText(ctx, text, maxWidth) {
        const words = text.split(' ');
        const lines = [];
        let current = '';

        for (const word of words) {
          const test = current ? `${current} ${word}` : word;
          if (ctx.measureText(test).width <= maxWidth || !current) {
            current = test;
          } else {
            lines.push(current);
            current = word;
          }
        }

        if (current) lines.push(current);
        return lines;
      }

      resize() {
        const container =
          this.canvas.closest('.hero__inner, .section__text') ||
          this.canvas.parentElement;
        const parentWidth = container.clientWidth;
        const mobile = window.innerWidth < 680;

        this.fontSize = mobile
          ? Math.min(
              this.baseFontSize,
              this.baseFontSize >= 100 ? 74 : this.baseFontSize >= 50 ? 44 : 20
            )
          : this.baseFontSize;

        const fontFamily = this.getFontFamily();
        const innerWidth = Math.max(120, Math.min(this.maxWidth, parentWidth));
        const measure = document.createElement('canvas').getContext('2d');
        measure.font = `${this.fontWeight} ${this.fontSize}px ${fontFamily}`;
        measure.textBaseline = 'alphabetic';

        const contentWidth = Math.max(80, innerWidth - this.padding * 2);
        const lines = this.wrapText(measure, this.text, contentWidth);
        const metrics = measure.measureText('Mg');
        const ascent = Math.ceil(
          metrics.actualBoundingBoxAscent || this.fontSize * 0.8
        );
        const descent = Math.ceil(
          metrics.actualBoundingBoxDescent || this.fontSize * 0.2
        );
        const lineBox = Math.ceil((ascent + descent) * this.lineHeight);
        const height = Math.max(40, lines.length * lineBox + this.padding * 2);
        const width = innerWidth;

        this.canvas.width = width;
        this.canvas.height = height;
        this.canvas.style.width = `${width}px`;
        this.canvas.style.height = `${height}px`;

        this.offscreen.width = width;
        this.offscreen.height = height;

        const ctx = this.offCtx;
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = this.color;
        ctx.textBaseline = 'alphabetic';
        ctx.textAlign = 'left';
        ctx.font = `${this.fontWeight} ${this.fontSize}px ${fontFamily}`;

        lines.forEach((line, index) => {
          const y = this.padding + ascent + index * lineBox;
          ctx.fillText(line, this.padding, y);
        });

        this.draw();
      }

      setScrollProgress(progress) {
        if (this.revealMode !== 'scroll') return;
        const eased = 1 - Math.pow(1 - progress, 3);
        this.targetPixelSize = Math.max(1, this.initialPixelSize * (1 - eased));
      }

      update(now) {
        if (this.revealMode === 'time') {
          const t = Math.min((now - this.startTime) / this.duration, 1);
          const eased = 1 - Math.pow(1 - t, 3);
          this.targetPixelSize = Math.max(1, this.initialPixelSize * (1 - eased));
        }

        this.pixelSize += (this.targetPixelSize - this.pixelSize) * 0.14;

        if (Math.abs(this.pixelSize - this.targetPixelSize) < 0.08) {
          this.pixelSize = this.targetPixelSize;
        }

        this.draw();
      }

      draw() {
        const w = this.canvas.width;
        const h = this.canvas.height;
        this.ctx.clearRect(0, 0, w, h);

        const scaledW = Math.max(1, Math.ceil(w / Math.max(1, this.pixelSize)));
        const scaledH = Math.max(1, Math.ceil(h / Math.max(1, this.pixelSize)));
        const tinyPad = 2;
        const tinyW = scaledW + tinyPad * 2;
        const tinyH = scaledH + tinyPad * 2;

        if (this.tinyCanvas.width !== tinyW || this.tinyCanvas.height !== tinyH) {
          this.tinyCanvas.width = tinyW;
          this.tinyCanvas.height = tinyH;
        }

        this.tinyCtx.clearRect(0, 0, tinyW, tinyH);
        this.tinyCtx.imageSmoothingEnabled = false;
        this.tinyCtx.drawImage(
          this.offscreen,
          0,
          0,
          w,
          h,
          tinyPad,
          tinyPad,
          scaledW,
          scaledH
        );

        this.ctx.imageSmoothingEnabled = false;
        this.ctx.drawImage(this.tinyCanvas, 0, 0, tinyW, tinyH, 0, 0, w, h);
      }
    }

    function destroyTextBlocks() {
      textBlocks = [];
    }

    function initTextBlocks() {
      destroyTextBlocks();
      document.querySelectorAll('canvas[data-i18n]').forEach((canvas) => {
        canvas.dataset.text = t(canvas.dataset.i18n);
      });
      textBlocks = Array.from(document.querySelectorAll('.pixel-reveal')).map(
        (canvas) => new PixelRevealText(canvas)
      );
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function updateScrollRevealTargets() {
      textBlocks.forEach((block) => {
        if (block.revealMode !== 'scroll') return;

        const rect = block.canvas.getBoundingClientRect();
        const start = window.innerHeight * 0.94;
        const end = window.innerHeight * 0.38;
        const progress = clamp((start - rect.top) / (start - end), 0, 1);
        block.setScrollProgress(progress);
      });
    }

    function animate(now) {
      updateScrollRevealTargets();
      textBlocks.forEach((block) => block.update(now));
      requestAnimationFrame(animate);
    }

    async function setLanguage(language) {
      const safeLanguage = SUPPORTED_LANGUAGES.includes(language) ? language : DEFAULT_LANGUAGE;
      translations = await loadTranslations(safeLanguage);
      localStorage.setItem('preferred-language', safeLanguage);
      document.querySelectorAll('.language-flag').forEach((button) => {
        button.classList.toggle('active', button.dataset.lang === safeLanguage);
      });
      applyStaticTranslations();
      initTextBlocks();
      updateScrollRevealTargets();
    }

    function getInitialLanguage() {
      const stored = localStorage.getItem('preferred-language');
      if (SUPPORTED_LANGUAGES.includes(stored)) return stored;

      const browserLanguage = (navigator.language || DEFAULT_LANGUAGE).slice(0, 2).toLowerCase();
      return SUPPORTED_LANGUAGES.includes(browserLanguage) ? browserLanguage : DEFAULT_LANGUAGE;
    }

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        textBlocks.forEach((block) => block.resize());
      }, 80);
    });

    document.querySelectorAll('.language-flag').forEach((button) => {
      button.addEventListener('click', async () => {
        await setLanguage(button.dataset.lang);
      });
    });

    setLanguage(getInitialLanguage())
      .then(() => {
        requestAnimationFrame(animate);
      })
      .catch(async (error) => {
        console.error(error);
        if (getInitialLanguage() !== DEFAULT_LANGUAGE) {
          await setLanguage(DEFAULT_LANGUAGE);
          requestAnimationFrame(animate);
        }
      });
  </script>
</body>
</html>
